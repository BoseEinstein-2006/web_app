<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4d36f" />
    <title>Party Cards</title>
    <!--
      APP_VERSION is a small manual cache-busting switch.
      When this value changes, the CSS/JS URLs change too, so browsers request
      the new files instead of reusing old cached copies.
    -->
    <script>
      window.APP_VERSION = "2026-06-06-10";
    </script>
    <link rel="stylesheet" href="./src/styles.css?v=2026-06-06-10" />
  </head>
  <body>
    <!--
      The whole game is rendered into this single element.
      src/app.js switches the content based on state.screen, which keeps the
      project GitHub Pages friendly: no router, backend, or build step needed.
    -->
    <main id="app" class="app-shell" aria-live="polite"></main>

    <!-- The version query makes the browser fetch the newest JavaScript after deploys. -->
    <script type="module" src="./src/app.js?v=2026-06-06-10"></script>
  </body>
</html>
